      <div style="display:flex;align-items:center;gap:8px;margin-bottom:0.3rem;"><span style="font-size:0.72rem;color:var(--text3);font-family:monospace;">Quantity:</span><input type="number" id="cr-qty" min="1" max="20" value="1" style="width:52px;background:var(--parchment2);border:1px solid var(--border2);color:var(--white);padding:2px 6px;font-size:0.8rem;"></div>
      <button class="forge-btn" onclick="forgeThing()">✦ Forge</button>`;
    document.querySelectorAll('.ptag').forEach(t => {
      t.addEventListener('click', () => updateCost());
    });
  }

  else if (tab === 'world') {
    const loc = LOCATION_DATA[G.world.location] || {};
    const locs = Object.keys(LOCATION_DATA).filter(l => l !== G.world.location);
    const known = locs.filter(l => G.player.knownLocations.includes(l));
    const unknown = locs.filter(l => !G.player.knownLocations.includes(l) && !LOCATION_DATA[l]?.secret);
    const secretLocs = locs.filter(l => !G.player.knownLocations.includes(l) && LOCATION_DATA[l]?.secret && LOCATION_DATA[l]?.unlockCondition?.(G.player));
    // Auto-unlock secret locations when condition met
    secretLocs.forEach(l => {
      if (!G.player.knownLocations.includes(l)) {
        G.player.knownLocations.push(l);
        log('A sealed letter appears at your feet. An invitation... to The Private Isle.','loot');
        toast('🏝️ New Location Unlocked: '+l);
      }
    });
    const travelBtns = known.map(l => {
      const ld = LOCATION_DATA[l];
      const danger = '⚠'.repeat(ld.danger);
      const special = ld.secret ? ' style="border-color:var(--gold);color:var(--gold);"' : '';
      return '<div class="wtrav" onclick="travelTo(\''+l+'\')">'+
        '<span>'+(ld.secret?'🏝\uFE0F ':'')+l+'</span>'+
        '<span class="wdist">'+danger+'</span>'+
      '</div>';
    }).join('');
    const unkBtns = unknown.map(l =>
      '<div class="wtrav" style="opacity:0.3;cursor:default;">'+
        '<span>??? (Undiscovered)</span>'+
        '<span class="wdist">?</span>'+
      '</div>').join('');
    const events = G.world.events.slice(-6).reverse().map(e =>
      `<div class="wevent">${e}</div>`).join('') || '<div class="wevent" style="color:var(--text3);">Nothing notable.</div>';
    body.innerHTML = `
      <div class="psec">
        <div class="wloc">${G.world.location}</div>
        <div style="font-size:0.8rem;color:var(--text2);line-height:1.6;">${loc.desc||''}</div>
        <div style="margin-top:0.4rem;font-size:0.72rem;color:var(--text3);">Danger: ${'⚠'.repeat(loc.danger||1)} · Wealth: ${'💰'.repeat(loc.wealth||1)}</div>
      </div>
      <div class="psec">
        <span class="plabel">Travel To</span>
        ${travelBtns}${unkBtns}
      </div>
      <div class="psec">
        <span class="plabel">Recent Events</span>
        ${events}
      </div>`;
  }

  else if (tab === 'ach') {
    body.innerHTML = renderAchievementsPanel();
  }

  else if (tab === 'quests') {
    body.innerHTML = renderQuestsPanel();
  }

  else if (tab === 'settings') {
    body.innerHTML = renderSettingsPanel();
  }

  else if (tab === 'stall') {
    openStallManager();
  }

  else if (tab === 'npcs') {
    const moodEmoji = {friendly:'😊',neutral:'😐',suspicious:'🤨',hostile:'😠',
      sad:'😔',cheerful:'😄',playful:'😁',afraid:'😨',infatuated:'😍',charmed:'😇'};
    const cards = G.npcs.map(npc => {
      const rel = p.relationships[npc.id];
      const aff = rel ? rel.affection : 0;
      const affStr = aff > 30 ? `<span style="color:var(--sage2)">Friendly (${aff})</span>` :
        aff < -30 ? `<span style="color:var(--ember2)">Hostile (${aff})</span>` :
        `<span style="color:var(--text3)">Neutral</span>`;
      const statSum = `STR:${npc.stats.STR} DEX:${npc.stats.DEX} INT:${npc.stats.INT} CHA:${npc.stats.CHA}`;
      return `<div class="npc-card" onclick="npcMenu('${npc.id}')">
        <span class="nm">${moodEmoji[npc.mood]||'😐'}</span>
        <div class="nn">${npc.name}</div>
        <div class="nr">${npc.role} · ${npc.gender==='m'?'M':npc.gender==='f'?'F':'?'} · ${affStr}</div>
        <div class="nstats">${statSum}</div>
      </div>`;
    }).join('') || '<div style="color:var(--text3);font-style:italic;padding:0.5rem;">Nobody nearby.</div>';
    body.innerHTML = `<span class="plabel">Nearby (${G.npcs.length})</span>${cards}`;
  }
}

// ── CREATION PROP TOGGLE ──
let selProps = [];
function toggleProp(el, pr) {
  el.classList.toggle('sel');
  if (selProps.includes(pr)) selProps = selProps.filter(p=>p!==pr);
  else selProps.push(pr);
  updateCost();
}
function updateCost() {
  const base = 10;
  const cost = base + selProps.length * 4;
  const el = document.getElementById('cr-cost');
  const mpe = document.getElementById('cr-mp');
  if (el) el.textContent = cost;
  if (mpe && G) mpe.textContent = G.player.mp+'/'+G.player.mpMax;
}

// ═══════════════════════════════════════════════════════════════════════
// ITEM ACTIONS
// ═══════════════════════════════════════════════════════════════════════
function itemAction(idx) {
  const it = G.player.inventory[idx];
  if (!it) return;
  const propchips = it.props.map(pr=>`<span class="prop-chip ${pr}" style="margin:2px;">${pr}</span>`).join('');
  const acts = [];
  if (it.props.some(p=>['edible','healing','potion'].includes(p))) acts.push({label:'Consume',fn:()=>consumeItem(idx),cls:'ok'});
  if (it.props.some(p=>['weapon','sharp','blunt'].includes(p))) acts.push({label:'Equip',fn:()=>equipItem(idx),cls:'ok'});
  acts.push({label:'Give to NPC',fn:()=>giveItemFlow(idx)});
  acts.push({label:'Force-feed',fn:()=>forceFeedFlow(idx),cls:'bad'});
  acts.push({label:'Drop',fn:()=>{G.player.inventory.splice(idx,1);closeModal();log('You drop '+it.name+'.','act');updateHUD();renderDrawer('inv');saveGame();}});
  acts.push({label:'Close',fn:closeModal});
  openModal(it.icon+' '+it.name,
    `<div style="margin-bottom:0.5rem;color:var(--text2);font-size:0.82rem;">${it.desc||''}</div>
     <div style="margin-bottom:0.4rem;">${propchips}</div>
     <div style="font-size:0.78rem;color:var(--text3);">Value: ⬡${it.val} · Qty: ${it.qty}</div>`,
    acts);
}

function consumeItem(idx) {
  const it = G.player.inventory[idx];
  const p = G.player;
  let fx = [];
  const isDangerous = it.props.some(pr=>['poison','toxic','cursed','fire','acid'].includes(pr));
  if (!isDangerous) eatItem(it);
  if (it.props.includes('healing')) { const h=15+p.stats.CON*2; p.hp=Math.min(p.hpMax,p.hp+h); fx.push('+'+h+' HP'); }
  if (it.props.includes('magic')) { const m=12; p.mp=Math.min(p.mpMax,p.mp+m); fx.push('+'+m+' MP'); }
  if (it.props.includes('poison')) { const d=12; p.hp=Math.max(1,p.hp-d); addStatus('Poisoned'); fx.push('-'+d+' HP (poison!)'); }
  if (it.props.includes('fire')) { p.hp=Math.max(1,p.hp-8); fx.push('-8 HP (burning!)'); }
  if (it.props.includes('cursed')) { addStatus('Cursed'); fx.push('You feel cursed...'); }
  if (it.props.includes('charming')) { addStatus('Charmed'); fx.push('You feel strangely pleasant.'); }
  if (it.props.includes('stat-boost')) {
    const s = STATS[~~(Math.random()*STATS.length)];
    p.stats[s]++; fx.push(s+'+1 permanently!');
  }
  if (it.props.includes('stat-drain')) {
    const s = STATS[~~(Math.random()*STATS.length)];
    p.stats[s] = Math.max(1,p.stats[s]-1); fx.push(s+'-1 (drained)');
  }
  it.qty--;
  if (it.qty<=0) G.player.inventory.splice(idx,1);
  closeModal();
  log('You consume '+it.name+'. '+( fx.join(', ')||'Nothing notable happens.'),'act');
  gainXP(5); updateHUD(); renderDrawer('inv'); saveGame();
}

function equipItem(idx) {
  const it = G.player.inventory[idx];
  closeModal();
  if (!G.player.statuses.includes('Armed')) G.player.statuses.push('Armed');
  log('You equip '+it.name+'. It feels '+( it.props.includes('heavy')?'heavy':'ready')+'.','act');
  renderDrawer('char');
}

function giveItemFlow(idx) {
  const it = G.player.inventory[idx];
  openModal('Give: '+it.name, 'Choose who to give <strong>'+it.name+'</strong> to:',
    G.npcs.map(npc => ({label:npc.name+' ('+npc.role+')',fn:()=>giveItem(idx,npc.id)}))
    .concat([{label:'Cancel',fn:closeModal}]));
}

function giveItem(itemIdx, npcId) {
  const it = G.player.inventory[itemIdx];
  const npc = G.npcs.find(n=>n.id===npcId);
  if (!npc) return;
  let reaction = '', moodShift = 0;

  if (it.props.includes('poison') || it.props.includes('cursed') || it.props.includes('toxic')) {
    const detect = npc.stats.WIS > G.player.stats.INT;
    if (detect) { reaction = 'looks at it with suspicion and refuses.'; }
    else { reaction = 'accepts it, unaware of its true nature...'; applyItemToNPC(npc, it); moodShift = -20; }
  } else if (it.props.includes('charming') || it.props.includes('arousing')) {
    reaction = 'eyes go wide and glassy. They seem enchanted.'; npc.mood='infatuated'; moodShift = 40;
  } else if (it.props.includes('healing') || it.props.includes('edible')) {
    reaction = 'accepts it gratefully.'; moodShift = 15;
  } else if (it.props.includes('terrifying')) {
    reaction = 'recoils in fear!'; npc.mood='afraid'; moodShift = -25;
  } else {
    reaction = 'takes it with a nod.'; moodShift = 8;
  }

  if (!reaction.includes('refuses')) {
    it.qty--; if (it.qty<=0) G.player.inventory.splice(itemIdx,1);
    G.player.gifts++;
  }
  nudgeRelation(npc, moodShift);
  closeModal();
  log(npc.name + ' ' + reaction, 'social');
  gainXP(10); updateHUD(); renderDrawer('inv'); saveGame();
}

function forceFeedFlow(idx) {
  const it = G.player.inventory[idx];
  openModal('Force Feed: '+it.name,
    'You need STR+DEX > target to overpower them. Who is your target?',
    G.npcs.map(npc => ({
      label: npc.name+' (STR:'+npc.stats.STR+' DEX:'+npc.stats.DEX+')',
      fn: ()=>forceFeed(idx, npc.id), cls:'bad'
    })).concat([{label:'Cancel',fn:closeModal}]));
}

function forceFeed(itemIdx, npcId) {
  const it = G.player.inventory[itemIdx];
  const npc = G.npcs.find(n=>n.id===npcId);
  const p = G.player;
  const myPow = p.stats.STR + p.stats.DEX + p.level*2;
  const theirPow = npc.stats.STR + npc.stats.DEX;
  closeModal();
  if (myPow <= theirPow) {
    const dmg = ~~(theirPow/3)+2;
    p.hp = Math.max(1, p.hp-dmg);
    npc.mood = 'hostile'; nudgeRelation(npc,-30);
    log(npc.name+' overpowers you. -'+dmg+' HP.','combat');
    p.crimes++;
  } else {
    applyItemToNPC(npc, it);
    it.qty--; if (it.qty<=0) p.inventory.splice(itemIdx,1);
    p.crimes++;
    log('You force '+it.name+' into '+npc.name+'\'s mouth.','danger');
    gainXP(15);
  }
  updateHUD(); renderDrawer('inv'); saveGame();
}

function applyItemToNPC(npc, it) {
  const fx = [];
  if (it.props.includes('poison')||it.props.includes('toxic')) { npc.mood='sad'; fx.push('convulses'); nudgeRelation(npc,-40); }
  if (it.props.includes('healing')) { npc.mood='neutral'; fx.push('seems healthier'); nudgeRelation(npc,10); }
  if (it.props.includes('charming')) { npc.mood='charmed'; fx.push('falls under your charm'); nudgeRelation(npc,30); }
  if (it.props.includes('fire')) { npc.mood='hostile'; fx.push('screams and flails'); nudgeRelation(npc,-50); }
  if (it.props.includes('cursed')) { addNPCStatus(npc,'Cursed'); fx.push('twitches oddly'); }
  if (it.props.includes('stat-drain')) { const s=STATS[~~(Math.random()*STATS.length)]; npc.stats[s]=Math.max(1,npc.stats[s]-2); fx.push(s+' drained'); }
  if (it.props.includes('stat-boost')) { const s=STATS[~~(Math.random()*STATS.length)]; npc.stats[s]+=2; fx.push(s+' boosted'); }
  if (it.props.includes('terrifying')) { npc.mood='afraid'; nudgeRelation(npc,-20); fx.push('trembles'); }
  if (it.props.includes('maddening')) { npc.mood='hostile'; nudgeRelation(npc,-30); fx.push('goes berserk'); }
  if (fx.length) log(npc.name+' '+fx.join(' and ')+'.','social');
}

// ═══════════════════════════════════════════════════════════════════════
// NPC SYSTEM
// ═══════════════════════════════════════════════════════════════════════
function nudgeRelation(npc, amt) {
  if (!G.player.relationships[npc.id]) G.player.relationships[npc.id] = {affection:0, known:true};
  G.player.relationships[npc.id].affection = Math.max(-100, Math.min(100, G.player.relationships[npc.id].affection + amt));
  const aff = G.player.relationships[npc.id].affection;
  if (aff > 60) npc.mood = 'infatuated';
  else if (aff > 30) npc.mood = 'friendly';
  else if (aff > 10) npc.mood = 'neutral';
  else if (aff < -60) npc.mood = 'hostile';
  else if (aff < -30) npc.mood = 'suspicious';
}

function npcMenu(id) {
  const npc = G.npcs.find(n=>n.id===id);
  if (!npc) return;
  const p = G.player;
  const rel = p.relationships[id];
  const aff = rel ? rel.affection : 0;
  const moodTxt = {friendly:'friendly',neutral:'indifferent',suspicious:'wary of you',
    hostile:'hostile',charmed:'enchanted by you',afraid:'afraid of you',
    infatuated:'infatuated with you',sad:'sad',cheerful:'cheerful',playful:'playful'};
  const propchips = (npc.props||[]).map(pr=>`<span class="prop-chip ${pr}">${pr}</span>`).join(' ');
  const statStr = STATS.map(s=>`${s}:${npc.stats[s]}`).join(' ');

  const acts = [];
  acts.push({label:'Talk',fn:()=>talkNPC(npc),cls:'ok'});
  if (npc.role==='Merchant'||npc.role==='Innkeeper'||npc.role==='Blacksmith'||npc.role==='Smuggler') {
    acts.push({label:'Trade',fn:()=>tradeNPC(npc)});
  }
  acts.push({label:'Observe',fn:()=>observeNPC(npc)});
  if (p.stats.CHA > npc.stats.CHA-3) acts.push({label:'Persuade',fn:()=>persuadeNPC(npc),cls:'ok'});
  if (p.stats.STR > npc.stats.STR || p.level > npc.stats.CON/3) acts.push({label:'Intimidate',fn:()=>intimidateNPC(npc),cls:'bad'});
  acts.push({label:'Kiss',fn:()=>{ closeModal(); if(checkMinorCrimeConsequence(npc))return; kissNPC(npc); }});
  if (aff > 20) acts.push({label:'Propose',fn:()=>proposeNPC(npc)});
  acts.push({label:'Get Quest',fn:()=>{closeModal();getQuestFromNPC(npc);}});
  acts.push({label:G.player.clan.includes(npc.id)?'Remove Clan':'Join Clan',fn:()=>{closeModal();G.player.clan.includes(npc.id)?removeFromClan(npc.id):addToClan(npc.id);}});
  if (npc.forged) acts.push({label:'Sell',fn:()=>sellNPC(npc.id)});
  if (p.stats.STR + p.stats.DEX + p.level*2 > npc.stats.STR + npc.stats.DEX) {
    acts.push({label:'Steal From',fn:()=>stealFromNPC(npc)});
  }
  acts.push({label:'Attack',fn:()=>attackNPC(npc),cls:'bad'});
  acts.push({label:'Close',fn:closeModal});

  openModal(npc.name+' — '+npc.role,
    `<div style="margin-bottom:0.5rem;">Currently <em>${moodTxt[npc.mood]||npc.mood}</em>. Affection: ${aff}.</div>
     <div style="margin-bottom:0.4rem;">${propchips}</div>
     <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text3);">${statStr}</div>`,
    acts);
}

function talkNPC(npc) {
  closeModal();
  const d = npc.dialogue || {};
  const line = d[npc.mood] || d['neutral'] || (npc.name+' says nothing.');
  nudgeRelation(npc, 3);
  log(npc.name+': "'+line+'"','social');
  gainXP(3); saveGame();
}

function observeNPC(npc) {
  closeModal();
  const knownProps = (npc.props||[]).slice(0,3).join(', ');
  const dom = STATS.sort((a,b)=>npc.stats[b]-npc.stats[a])[0];
  log('You study '+npc.name+'. Properties: ['+knownProps+']. Dominant trait: '+STAT_NAMES[dom]+'.','act');
  gainXP(5); saveGame();
}

function tradeNPC(npc) {
  closeModal();
  if (npc.mood==='hostile') { log(npc.name+' refuses to trade with you.','social'); return; }
  const goods = ['Strange Herb','Smuggled Spice','Old Map Fragment','Cracked Gem','Leather Scraps',
    'Iron Shavings','Pickled Something','Rusty Key','Blank Scroll','Fish Jerky'];
  const item = goods[~~(Math.random()*goods.length)];
  let price = 8 + ~~(Math.random()*25);
  const mood = npc.mood;
  if (mood==='friendly'||mood==='charmed'||mood==='infatuated') price = ~~(price*0.7);
  openModal('Trade with '+npc.name,
    `${npc.name} offers: <strong>${item}</strong> for <strong>⬡${price}</strong>.`,
    [
      {label:'Buy (⬡'+price+')', fn:()=>buyFromNPC(npc,item,price), cls:'ok'},
      {label:'Haggle', fn:()=>haggleNPC(npc,item,price)},
      {label:'Cancel', fn:closeModal},
    ]);
}

function buyFromNPC(npc, itemName, price) {
  if (G.player.gold < price) { closeModal(); toast('Not enough gold!'); return; }
  G.player.gold -= price;
  const props = guessProps(itemName);
  G.player.inventory.push({id:'bought_'+Date.now(),name:itemName,icon:'📦',qty:1,props,val:price,desc:'Bought from '+npc.name+'.'});
  closeModal();
  log('You buy '+itemName+' from '+npc.name+' for ⬡'+price+'.','loot');
  nudgeRelation(npc, 5);
  gainXP(5); updateHUD(); renderDrawer('inv'); saveGame();
}

function guessProps(name) {
  const n = name.toLowerCase();
  const props = [];
  if (n.includes('herb')||n.includes('spice')) props.push('edible','healing');
  if (n.includes('gem')||n.includes('key')) props.push('valuable');
  if (n.includes('map')) props.push('knowledge');
  if (n.includes('scroll')) props.push('magic');
  if (n.includes('fish')||n.includes('jerky')||n.includes('pickled')) props.push('edible');
  if (n.includes('iron')||n.includes('leather')) props.push('crafting');
  return props.length ? props : ['unknown'];
}

function haggleNPC(npc, item, price) {
  const p = G.player;
  const success = p.stats.CHA + ~~(Math.random()*6) > npc.stats.CHA + ~~(Math.random()*6);
  if (success) {
    const np = Math.max(1, ~~(price * (0.55 + Math.random()*0.2)));
    closeModal();
    log(npc.name+' concedes. New price: ⬡'+np+'.','social');
    openModal('Trade', npc.name+' accepts ⬡'+np+' for '+item+'.',[
      {label:'Buy ⬡'+np, fn:()=>buyFromNPC(npc,item,np), cls:'ok'},
      {label:'Pass', fn:closeModal}
    ]);
    gainXP(8);
  } else {
    closeModal();
    log(npc.name+' narrows their eyes. "Full price, or nothing."','social');
    gainXP(2);
  }
}

function persuadeNPC(npc) {
  closeModal();
  const p = G.player;
  const roll = p.stats.CHA + ~~(Math.random()*8) - (npc.stats.WIS + ~~(Math.random()*6));
  if (roll > 0) {
    nudgeRelation(npc, 15+roll);
    log('Your words land well. '+npc.name+' warms to you.','social');
    gainXP(10);
  } else {
    log(npc.name+' is unmoved. "Don\'t try that on me."','social');
    gainXP(3);
  }
  saveGame();
}

function intimidateNPC(npc) {
  closeModal();
  const p = G.player;
  npc.mood = 'afraid';
  nudgeRelation(npc, -20);
  p.crimes++;
  log('You loom over '+npc.name+'. They pale. "...Fine."','danger');
  gainXP(8);
  if (!p.statuses.includes('Feared')) p.statuses.push('Feared');
  renderDrawer('char'); saveGame();
}

function kissNPC(npc) {
  closeModal();
  const p = G.player;
  const enchKiss = p.inventory.find(it => it.props.includes('charming')||it.props.includes('arousing'));
  let msg = '';
  if (enchKiss) {
    npc.mood = 'infatuated'; nudgeRelation(npc, 50);
    msg = 'You kiss '+npc.name+' with an enchanted touch. Their eyes glaze over with devotion.';
    gainXP(20);
  } else if (npc.mood === 'hostile' || npc.mood === 'afraid') {
    const dmg = 6;
    p.hp = Math.max(1, p.hp-dmg);
    nudgeRelation(npc, -15);
    msg = npc.name+' shoves you away. Hard. -'+dmg+' HP.';
    gainXP(3);
  } else if (p.stats.CHA >= npc.stats.WIS) {
    npc.mood = 'friendly'; nudgeRelation(npc, 25);
    msg = 'You kiss '+npc.name+'. They blush deeply and look away with a smile.';
    gainXP(12);
  } else {
    nudgeRelation(npc, -5);
    msg = npc.name+' pulls back. "Excuse me?!"';
    gainXP(3);
  }
  log(msg,'social'); updateHUD(); saveGame();
}

function proposeNPC(npc) {
  closeModal();
  const p = G.player;
  const aff = p.relationships[npc.id]?.affection || 0;
  if (aff > 40 && p.stats.CHA >= 10) {
    nudgeRelation(npc, 50);
    if (!p.statuses.includes('Betrothed to '+npc.name)) p.statuses.push('Betrothed to '+npc.name);
    log('You propose to '+npc.name+'. Tears in their eyes, they whisper: "Yes."','success');
    toast('💍 Betrothed to '+npc.name+'!');
    gainXP(30);
  } else if (aff > 20) {
    log(npc.name+' hesitates. "I... care for you, but not like that. Not yet."','social');
    gainXP(5);
  } else {
    nudgeRelation(npc, -10);
    log(npc.name+' looks embarrassed. "We barely know each other."','social');
    gainXP(2);
  }
  renderDrawer('char'); saveGame();
}

function attackNPC(npc) {
  closeModal();
  const p = G.player;
  const myAtk = p.stats.STR + p.stats.DEX + p.level*3 + ~~(Math.random()*10);
  const theirDef = npc.stats.STR + npc.stats.CON + ~~(Math.random()*8);
  nudgeRelation(npc, -50);
  npc.mood = 'hostile';
  p.crimes++;

  if (myAtk > theirDef) {
    const dmg = Math.max(3, myAtk - theirDef + ~~(Math.random()*8));
    log('You strike '+npc.name+' for '+dmg+' damage. They reel.','combat');
    gainXP(20 + ~~(dmg/2));
    p.kills++;
    // Counter
    const cdmg = Math.max(2, ~~(theirDef/4)+~~(Math.random()*5));
    p.hp = Math.max(0, p.hp-cdmg);
    log(npc.name+' retaliates: -'+cdmg+' HP to you.','combat');
  } else {
    const cdmg = Math.max(5, ~~(theirDef/2)+~~(Math.random()*8));
    p.hp = Math.max(0, p.hp-cdmg);
    log(npc.name+' overpowers you: -'+cdmg+' HP.','combat');
    gainXP(5);
  }
  // NPC death
  if (myAtk > theirDef) {
    npc.hp = (npc.hp || npc.stats.CON*5) - Math.max(3, myAtk - theirDef);
    if (npc.hp <= 0) {
      if (G.settings?.npcPermaDeath) {
        G.world.deadNPCs = G.world.deadNPCs || [];
        G.world.deadNPCs.push(npc.id);
        G.npcs = G.npcs.filter(n => n.id !== npc.id);
        G.player.clan = (G.player.clan||[]).filter(id => id !== npc.id);
        log(npc.name+' is dead. Permanently.','danger');
      } else {
        npc.hp = npc.stats.CON * 2;
        npc.mood = 'afraid';
        log(npc.name+' falls unconscious.','combat');
      }
    }
  }
  // Guards react to witnessed crime
  if (p.crimes > 3 && Math.random() < 0.4) {
    setTimeout(() => triggerArrest('Assault witnessed!'), 300);
  }
  if (p.hp <= 0) handleDeath();
  updateHUD(); renderDrawer('char'); saveGame();
}

function stealFromNPC(npc) {
  closeModal();
  const p = G.player;
  const myRoll = p.stats.DEX + ~~(Math.random()*10);
  const theirRoll = npc.stats.WIS + ~~(Math.random()*8);
  p.crimes++;
  if (myRoll > theirRoll) {
    const gold = 5 + ~~(Math.random()*(npc.stats.CHA*3));
    p.gold += gold;
    log('Nimble fingers. You lift ⬡'+gold+' from '+npc.name+' unnoticed.','loot');
    gainXP(15);
  } else {
    npc.mood = 'hostile'; nudgeRelation(npc,-35);
    const dmg = 4 + ~~(Math.random()*6);
    p.hp = Math.max(1, p.hp-dmg);
    log(npc.name+' catches your hand. They shove you away. -'+dmg+' HP.','combat');
    gainXP(5);
  }
  updateHUD(); saveGame();
}

function addNPCStatus(npc, st) {
  if (!npc.statuses) npc.statuses = [];
  if (!npc.statuses.includes(st)) npc.statuses.push(st);
}

function handleDeath() {
  const p = G.player;
  G.deathCount = (G.deathCount||0)+1;
  jailPursuit = false;
  G.npcs = G.npcs.filter(n=>!n.temporary);
  log('Everything goes black...','danger');
  // Respawn at infirmary/location spawn
  p.x=15; p.y=9;
  setTimeout(()=>{
    p.hp = Math.floor(p.hpMax * 0.25);
    const lost = Math.min(p.gold, 15 + ~~(Math.random()*20));
    p.gold = Math.max(0, p.gold - lost);
    // Remove a random item
    if (p.inventory.length > 0) {
      const ri = ~~(Math.random()*p.inventory.length);
      log('You wake in the gutter. Lost ⬡'+lost+' and your '+p.inventory[ri].name+'.','danger');
      p.inventory.splice(ri,1);
    } else {
      log('You wake in the gutter, stripped of ⬡'+lost+'. Survival is cruel.','danger');
    }
    // Advance time by several hours
    p.hour = (p.hour + 6) % 24;
    if (p.hour < 6) p.day++;
    updateHUD(); renderDrawer('char');
  }, 1500);
}

function travelTo(loc) {
  const p = G.player;
  const ld = LOCATION_DATA[loc];
  if (!ld) return;
  // Cannot travel while jailed
  if (hasStatus('Jailed')) {
    log('The guards block the exit. Pay bail, escape, or serve your time.','danger');
    return;
  }
  // The Private Isle consequences
  if (G.world.location === 'The Private Isle' && loc !== 'The Private Isle') {
    G.triedToLeaveIsle = true;
    if (Math.random() < 0.4) {
      log('Viktor steps in front of you. "Mr. Ashford would like you to stay a bit longer."','danger');
      nudgeRelation(G.npcs.find(n=>n.id==='isle_guard1')||{id:'x',mood:'hostile',stats:{STR:15,DEX:13,INT:8,CON:14,CHA:4,WIS:10}}, -20);
      const dmg = 8+~~(Math.random()*10);
      p.hp = Math.max(1, p.hp-dmg);
      log('You are escorted back. -'+dmg+' HP.','combat');
      updateHUD(); return;
    }
    log('You slip away from the island. Nobody acknowledges you left.','world');
  }
  // Travel time cost
  const hours = 2 + ~~(Math.random()*3);
  p.hour = (p.hour + hours) % 24;
  if (p.hour < hours) p.day++;
  // Small HP cost for dangerous travel
  if (ld.danger >= 3) {
    const dmg = ~~(ld.danger * (2 + Math.random()*4));
    p.hp = Math.max(1, p.hp - dmg);
    log('The journey was rough. -'+dmg+' HP.','world');
  }
  // Discover location
  if (!p.knownLocations.includes(loc)) p.knownLocations.push(loc);

  G.world.location = loc;
  G.npcs = buildNPCs(loc);
  // Clan members teleport with player
  (G.player.clan||[]).forEach((cid,i) => {
    // Check if NPC came from template
    const template = Object.values(NPC_TEMPLATES).flat().find(t=>t.id===cid);
    // Or was a forged NPC saved in world state
    const savedNPC = (G.world.clanNPCs||{})[cid];
    const base = template ? {...template, relations:{}, memory:[]} : savedNPC ? {...savedNPC} : null;
    if (base) { base.x = Math.max(1,Math.min(30,p.x+(i%3===0?1:i%3===1?-1:0))); base.y = Math.max(1,Math.min(30,p.y+(i<3?1:-1))); G.npcs.push(base); }
  });
  // Restore npc states if saved
  Object.entries(G.world.npcStates || {}).forEach(([id, state]) => {
    const npc = G.npcs.find(n=>n.id===id);
    if (npc) Object.assign(npc, state);
  });
  // Apply known relationships
  G.npcs.forEach(npc => {
    const rel = p.relationships[npc.id];
    if (rel) {
      const aff = rel.affection;
      if (aff > 60) npc.mood = 'infatuated';
      else if (aff > 30) npc.mood = 'friendly';
      else if (aff < -60) npc.mood = 'hostile';
      else if (aff < -30) npc.mood = 'suspicious';
    }
  });

  buildMap();
  p.x = 11; p.y = 11;
  log('You arrive at '+loc+'. '+( ld.ambient[~~(Math.random()*ld.ambient.length)] ), 'world');

  // World event on arrival
  generateWorldEvent(loc);

  if (G.world.location === 'Bandit Camp') {
    const chief = G.npcs.find(n=>n.id==='bandit_chief');
    if (chief && chief.mood === 'hostile') {
      log('The bandits spot you. Chief Rorn steps forward, hand on his blade.','danger');
    }
  }

  updateHUD(); renderDrawer('world'); closeModal(); saveGame();
}

const FORGE_ICONS = {item:'📦',weapon:'⚔️',potion:'⚗️',spell:'✨',skill:'💡',trap:'⚙️',food:'🍲',curse:'☠️',buff:'✦',key:'🗝️'};

function onForgeTypeChange() {
  const t = document.getElementById('cr-type')?.value;
  const npcFields = document.getElementById('cr-npc-fields');
  if (!npcFields) return;
  npcFields.style.display = t === 'npc' ? 'block' : 'none';
}

function forgeThing() {
  const name = document.getElementById('cr-name')?.value.trim();
  const type = document.getElementById('cr-type')?.value || 'item';
  const desc = document.getElementById('cr-desc')?.value.trim();
  const target = document.getElementById('cr-target')?.value.trim();
  if (!name) { toast('Name your creation first.'); return; }
  let cost = 10 + selProps.length * 4;
  if (G.player.mp < cost) { toast('Not enough MP! Need '+cost+'.'); return; }
  G.player.mp -= cost;
  G.player.crafted++;

  const creation = {
    id: name.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now(),
    name, type,
    icon: (()=>{
      // Priority: dedicated icon field > emoji in name > type default
      const iconField = document.getElementById('cr-icon')?.value.trim();
      if (iconField) return iconField;
      const emojiMatch = name.match(/\p{Emoji_Presentation}|\p{Extended_Pictographic}/u);
      return emojiMatch ? emojiMatch[0] : (FORGE_ICONS[type]||'✦');
    })(),
    name: name.replace(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}\s]+/u, '').trim() || name,
    props: [...selProps],
    desc: desc || autoDesc(name,type,selProps),
    qty: Math.max(1,parseInt(document.getElementById('cr-qty')?.value)||1),
    val: 10 + selProps.length * 12,
    created: true,
    target: target||null,
  };

  // Immediate world effects for world-edit and time-alter
  if (selProps.includes('world-edit') || selProps.includes('time-alter')) {
    applyWorldEdit(creation, desc, target);
    if (selProps.includes('world-edit')) G.worldEditCount = (G.worldEditCount||0)+1;
    if (selProps.includes('time-alter')) G.timeAlterCount = (G.timeAlterCount||0)+1;
  }

  // ── SUMMON NPC ──
  if (type === 'npc') {
    const role   = document.getElementById('cr-npc-role')?.value.trim() || 'Wanderer';
    const gender = document.getElementById('cr-npc-gender')?.value || 'm';
    const mood   = document.getElementById('cr-npc-mood')?.value || 'neutral';
    const line   = document.getElementById('cr-npc-line')?.value.trim();
    const nStat  = id => Math.min(20, Math.max(1, parseInt(document.getElementById('npc-'+id)?.value)||10));
    const stats  = {STR:nStat('str'),DEX:nStat('dex'),INT:nStat('int'),CON:nStat('con'),CHA:nStat('cha'),WIS:nStat('wis')};

    // Find a free spot near player
    let nx = G.player.x, ny = G.player.y;
    const offsets = [[2,0],[-2,0],[0,2],[0,-2],[3,0],[-3,0],[0,3],[0,-3],[1,1],[-1,1],[1,-1],[-1,-1]];
    for (const [dx,dy] of offsets) {
      const cx = G.player.x+dx, cy = G.player.y+dy;
      if (cx>=0&&cy>=0&&cx<=31&&cy<=31&&!G.npcs.find(n=>n.x===cx&&n.y===cy)) {
        nx=cx; ny=cy; break;
      }
    }

    // Auto dialogue based on props + mood
    const autoLine = line || (
      selProps.includes('hostile') ? 'Stay back.' :
      selProps.includes('charming') ? 'Well, hello there...' :
      selProps.includes('wealthy') ? 'I have coin if you have time.' :
      selProps.includes('magic') ? 'The threads of fate brought you here.' :
      mood === 'friendly' ? 'Good to meet you, traveller.' :
      mood === 'afraid' ? 'Please... do not hurt me.' :
      mood === 'hostile' ? 'What do you want?' :
      'Hmm.'
    );

    const npcAge = parseInt(document.getElementById('cr-npc-age')?.value)||null;
    const joinClan = document.getElementById('cr-npc-clan')?.checked||false;
    const isMinor = npcAge && npcAge < 18;
    const newNPC = {
      id: name.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+Date.now(),
      name, role, gender, mood,
      home: G.world.location,
      stats,
      props: [...selProps],
      x: nx, y: ny,
      routine: ['wanders','socializes','wanders','works','socializes','sleeps'],
      dialogue: {
        neutral:   autoLine,
        friendly:  selProps.includes('charming') ? 'I feel drawn to you...' : 'Always good to see you.',
        hostile:   'Leave me alone.',
        afraid:    'I mean no harm!',
        charmed:   'Anything you need...',
        infatuated:'I think about you constantly.',
      },
      relations: {}, memory: [],
      age: npcAge,
      props: isMinor ? [...selProps,'child'] : [...selProps],
      forged: true,
    };

    G.npcs.push(newNPC);
    if (joinClan) { G.player.clan.push(newNPC.id); log(name+' joins your clan.','social'); }
    log('✦ You breathe life into '+name+'. They appear before you. MP -'+cost+'.','creation');
    toast('✦ '+name+' summoned!');
    gainXP(30 + selProps.length * 8);
    selProps = [];
    document.querySelectorAll('.ptag.sel').forEach(t=>t.classList.remove('sel'));
    if (document.getElementById('cr-name')) document.getElementById('cr-name').value='';
    if (document.getElementById('cr-desc')) document.getElementById('cr-desc').value='';
    updateCost(); updateHUD(); saveGame();
    renderDrawer('npcs');
    return;
  }

  if (type === 'skill') {
    if (!G.player.skills.includes(name)) G.player.skills.push(name);
    log('✦ Skill forged: "'+name+'". It is now part of you. MP -'+cost+'.','creation');
    toast('Skill "'+name+'" learned!');
    renderDrawer('char');
  } else if (type === 'curse') {
    // Apply curse to target NPC if specified
    const tNPC = target ? G.npcs.find(n=>n.name.toLowerCase().includes(target.toLowerCase())) : null;
    if (tNPC) {
      applyItemToNPC(tNPC, creation);
      log('✦ You forge and direct a curse at '+tNPC.name+'. They shudder.','creation');
    } else {
      G.player.inventory.push(creation);
      log('✦ Forged: '+name+' ['+selProps.join(', ')+']. MP -'+cost+'.','creation');
    }
    renderDrawer('npcs');
  } else if (type === 'buff') {
    // Apply buff to self if no target, or to NPC
    if (selProps.includes('stat-boost')) {
      const s = STATS[~~(Math.random()*STATS.length)];
      G.player.stats[s]++;
      log('✦ You imbue yourself with '+name+'. '+STAT_NAMES[s]+' permanently +1! MP -'+cost+'.','creation');
      toast(STAT_NAMES[s]+' +1!');
      renderDrawer('char');
    } else {
      G.player.inventory.push(creation);
      log('✦ Enchantment forged: '+name+'. MP -'+cost+'.','creation');
    }
  } else {
    G.player.inventory.push(creation);
    log('✦ Forged: '+name+' ['+selProps.join(', ')+']. MP -'+cost+'.','creation');
    renderDrawer('inv');
  }

  gainXP(20 + selProps.length * 5);
  selProps = [];
  document.querySelectorAll('.ptag.sel').forEach(t=>t.classList.remove('sel'));
  if (document.getElementById('cr-name')) document.getElementById('cr-name').value='';
  if (document.getElementById('cr-desc')) document.getElementById('cr-desc').value='';
  if (document.getElementById('cr-target')) document.getElementById('cr-target').value='';
  updateCost();
  updateHUD(); saveGame();
}

function applyWorldEdit(creation, desc, target) {
  const d = (desc||'').toLowerCase();
  // Time manipulation
  if (creation.props.includes('time-alter')) {
    if (d.includes('dawn')||d.includes('morning')) { G.player.hour = 7; log('✦ Time warps. It is now dawn.','creation'); }
    else if (d.includes('night')) { G.player.hour = 22; log('✦ Darkness falls suddenly.','creation'); }
    else if (d.includes('skip')||d.includes('advance')) {
      G.player.hour = (G.player.hour+6)%24;
      log('✦ Time lurches forward. Hours pass in an instant.','creation');
    }
  }
  // World changes
  if (creation.props.includes('world-edit')) {
    if (target) {
      const tNPC = G.npcs.find(n=>n.name.toLowerCase().includes(target.toLowerCase()));
      if (tNPC && d.includes('remove')||d.includes('vanish')||d.includes('disappear')) {
        G.npcs = G.npcs.filter(n=>n.id!==tNPC.id);
        log('✦ '+tNPC.name+' ceases to exist in this location.','creation');
      } else if (tNPC && d.includes('stat')) {
        STATS.forEach(s => { if (d.includes(s.toLowerCase())) { tNPC.stats[s] = Math.max(1, tNPC.stats[s] + (d.includes('+') ? 5 : -5)); } });
        log('✦ The fabric of '+tNPC.name+' shifts.','creation');
      } else if (tNPC && (d.includes('friendly')||d.includes('like')||d.includes('love'))) {
        tNPC.mood = 'friendly'; nudgeRelation(tNPC, 40);
        log('✦ '+tNPC.name+' feels an inexplicable warmth toward you.','creation');
      } else if (tNPC && (d.includes('hostile')||d.includes('angry')||d.includes('hate'))) {
        tNPC.mood = 'hostile'; nudgeRelation(tNPC, -40);
        log('✦ A dark cloud settles over '+tNPC.name+'.','creation');
      }
    }
    // Gold manipulation
    if (d.includes('gold')||d.includes('wealth')||d.includes('money')) {
      const gained = 20 + ~~(Math.random()*50) + G.player.stats.INT*3;
      G.player.gold += gained;
      log('✦ Reality bends. ⬡'+gained+' materializes.','loot');
    }
  }
}

function autoDesc(name, type, props) {
  const d = {
    weapon:`A ${props.includes('fire')?'blazing':props.includes('shadow')?'dark':'crude'} ${name}. Hums with ${props[0]||'unknown'} energy.`,
    potion:`A ${props.includes('healing')?'glowing':props.includes('poison')?'murky':'swirling'} concoction.`,
    spell:`The formula for ${name}. Requires concentration to cast.`,
    food:`${name}. Combines: ${props.slice(0,3).join(', ')}.`,
    curse:`${name}. A dark working. Handle with intent.`,
    buff:`${name}. An empowerment of ${props.join(', ')}.`,
    skill:`The art of ${name}. Now permanently yours.`,
    item:`${name}. Properties: ${props.join(', ')}.`,
    trap:`${name}. Triggers on contact.`,
    key:`${name}. Opens something.`,
  };
  return d[type]||`${name}.`;
}

        Places: Crossroads Town, Dark Forest, The Ruins,<br>
        Hilltop Village, Docks, Bandit Camp<br><br>
        <div style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:0.65rem;text-transform:uppercase;margin-bottom:0.3rem;">Creation (Forge tab)</div>
        Name + type + properties + description → Forge<br>
        Properties like <em>world-edit</em> or <em>time-alter</em> affect reality<br>
        <em>stat-boost</em> on a buff = permanent stat gain<br><br>
        <div style="color:var(--text3);font-style:italic;font-size:0.78rem;">Type anything. The world tries to resolve it.</div>
      </div>`,
      [{label:'Close',fn:closeModal}]);
    return;
  }

  // KISS
  if (c.includes('kiss')) {
    const t = c.replace(/kiss\s*/i,'').trim();
    const npc = findNPC(t);
    if (npc) { kissNPC(npc); handled=true; }
    else if (c.includes('tree')||c.includes('wood')) { log('You kiss a tree. It tastes of bark. It is unmoved.','act'); handled=true; }
    else if (c.includes('rock')||c.includes('stone')) { log('The rock grows slightly warmer from your lips. Still a rock.','act'); handled=true; }
    else if (c.includes('fire')||c.includes('flame')) { p.hp=Math.max(1,p.hp-12); log('You kiss the fire. Deeply unwise. -12 HP.','combat'); handled=true; }
    else if (c.includes('water')||c.includes('sea')) { log('Cold. Wet. Nothing else.','act'); handled=true; }
  }

  // ATTACK
  if (!handled && (c.includes('attack')||c.includes('fight')||c.includes('punch')||c.includes('hit ')||c.includes('stab'))) {
    const t = c.replace(/attack|fight|punch|hit|stab/g,'').trim();
    const npc = findNPC(t) || G.npcs[~~(Math.random()*G.npcs.length)];
    if (npc) { attackNPC(npc); handled=true; }
  }

  // STEAL
  if (!handled && (c.includes('steal')||c.includes('pickpocket')||c.includes('rob'))) {
    const t = c.replace(/steal|from|pickpocket|rob/g,'').trim();
    const npc = findNPC(t) || G.npcs[~~(Math.random()*G.npcs.length)];
    if (npc) { stealFromNPC(npc); handled=true; }
  }

  // INTIMIDATE
  if (!handled && c.includes('intimidate')) {
    const t = c.replace('intimidate','').trim();
    const npc = findNPC(t);
    if (npc) { intimidateNPC(npc); handled=true; }
  }

  // REST/SLEEP
  // ── NEW COMMANDS ──
  if (!handled && (c==='surrender'||c.includes('surrender')||c==='give up'||c==='i surrender')) { surrenderToGuards(); handled=true; }
  if (!handled && (c.includes('stall')||c.includes('open stall')||c.includes('my stall')||c.includes('manage stall')||c.includes('vend'))) { openStallManager(); handled=true; }
  if (!handled && c.startsWith('enter ')) {
    const place = c.replace('enter ','').trim();
    const keyMap = {inn:'inn',tavern:'inn',guild:'guild',mansion:'mansion',blacksmith:'blacksmith',shop:'blacksmith',forge:'blacksmith',dimension:'dimension',rift:'dimension'};
    const tmplKey = keyMap[place] || null;
    if (tmplKey && INTERIOR_TEMPLATES[tmplKey]) { enterInterior(tmplKey,0); handled=true; }
    else { log('No such place to enter here.','sys'); handled=true; }
  }
  if (!handled && (c==='exit'||c==='leave'||c==='go outside'||c==='outside') && currentInterior) { exitInterior(); handled=true; }
  if (!handled && (c.startsWith('open dimension')||c.startsWith('create dimension')||c.startsWith('enter dimension')||c.startsWith('my dimension'))) { enterDimension('personal'); handled=true; }
  if (!handled && (c.includes('quest')||c.includes('quests')) && !c.includes('get')) { renderDrawer('quests'); if(document.getElementById('drawer')) document.getElementById('drawer').classList.add('open'); handled=true; }

    if (!handled && (c.includes('rest')||c.includes('sleep')||c==='recover')) {
    const hpg = ~~(p.hpMax*0.35), mpg = ~~(p.mpMax*0.45);
    p.hp = Math.min(p.hpMax, p.hp+hpg);
    p.mp = Math.min(p.mpMax, p.mp+mpg);
    p.hour = (p.hour+7)%24;
    if (p.hour<7) p.day++;
    // Tick world while sleeping
    tickNPCs(7);
    log('You rest. +'+hpg+' HP, +'+mpg+' MP. Time passes.','success');
    handled=true;
    gainXP(4);
  }

  // FORAGE
  if (!handled && (c.includes('forage')||c.includes('gather')||c.includes('scavenge'))) {
    const loc = LOCATION_DATA[G.world.location];
    const bonus = (loc&&loc.type==='wilderness') ? 0.3 : 0;
    if (Math.random() < 0.55 + bonus + p.stats.WIS*0.02) {
      const pool = loc&&loc.type==='ruins'
        ? [{n:'Cracked Gem',i:'💎',pr:['valuable'],v:15},{n:'Ancient Shard',i:'🪬',pr:['magic','ancient'],v:20}]
        : [{n:'Wild Herb',i:'🌿',pr:['edible','healing'],v:4},{n:'Mushroom',i:'🍄',pr:['edible','poison'],v:3},
           {n:'Berries',i:'🫐',pr:['edible'],v:2},{n:'Strange Root',i:'🌱',pr:['edible','magic'],v:7}];
      const found = pool[~~(Math.random()*pool.length)];
      p.inventory.push({id:'foraged_'+Date.now(),name:found.n,icon:found.i,qty:1,props:found.pr,val:found.v,desc:'Foraged.'});
      log('You search and find: '+found.n+'.','loot');
      gainXP(8); updateHUD(); renderDrawer('inv');
    } else {
      log('You search but find nothing useful here.','act');
      gainXP(2);
    }
    handled=true;
  }

  // COOK / BREW
  if (!handled && (c.includes('cook')||c.includes('brew')||c.includes('bake')||c.includes('prepare food'))) {
    const edibles = p.inventory.filter(i=>i.props.includes('edible'));
    if (edibles.length >= 2) {
      const combined = [...new Set([...edibles[0].props,...edibles[1].props])];
      const dish = 'Mystery '+ ['Stew','Brew','Cake','Tonic','Concoction'][~~(Math.random()*5)];
      edibles[0].qty--; if (edibles[0].qty<=0) p.inventory.splice(p.inventory.indexOf(edibles[0]),1);
      edibles[1].qty--; if (edibles[1].qty<=0) p.inventory.splice(p.inventory.indexOf(edibles[1]),1);
      p.inventory.push({id:'cooked_'+Date.now(),name:dish,icon:'🍲',qty:1,props:combined,val:14,desc:'Cooked by hand.'});
      log('You cook a '+dish+'. Properties: ['+combined.join(', ')+'].','creation');
      gainXP(12); updateHUD(); renderDrawer('inv');
    } else {
      log('You need at least 2 edible ingredients to cook.','act');
    }
    handled=true;
  }

  // LOOK / OBSERVE
  if (!handled && (c.includes('look')||c.includes('observe')||c.includes('examine')||c.includes('survey'))) {
    const loc = LOCATION_DATA[G.world.location];
    const nearby = G.npcs.slice(0,3).map(n=>n.name+' ('+n.role+')').join(', ') || 'nobody';
    const ambient = loc?.ambient[~~(Math.random()*loc.ambient.length)] || 'The area is quiet.';
    log('You survey '+G.world.location+'. Nearby: '+nearby+'. '+ambient,'act');
    gainXP(3); handled=true;
  }

  // SELL / OPEN STALL
  if (!handled && (c.includes('sell')||c.includes('stall')||c.includes('open shop')||c.includes('market'))) {
    const item = p.inventory.find(i=>i.val>0);
    if (item) {
      const demand = LOCATION_DATA[G.world.location]?.wealth || 2;
      const mult = 0.6 + demand*0.15 + Math.random()*0.3 + p.stats.CHA*0.02;
      const earned = Math.max(1, ~~(item.val * mult));
      p.gold += earned;
      item.qty--; if (item.qty<=0) p.inventory.splice(p.inventory.indexOf(item),1);
      log('You sell '+item.name+' for ⬡'+earned+'. '+( earned > item.val ? 'Good price!' : 'Modest sale.'),'loot');
      gainXP(10); updateHUD(); renderDrawer('inv');
    } else { log('Nothing to sell.','act'); }
    handled=true;
  }

  // TRADE / BROWSE
  if (!handled && (c.includes('trade')||c.includes('browse')||c.includes('shop'))) {
    const merchant = G.npcs.find(n=>['Merchant','Smuggler','Innkeeper'].includes(n.role));
    if (merchant) { tradeNPC(merchant); handled=true; }
    else { log('No merchant nearby.','act'); handled=true; }
  }

  // TRAVEL
  if (!handled && (c.includes('travel')||c.includes('go to')||c.includes('head to')||c.includes('walk to'))) {
    const locs = Object.keys(LOCATION_DATA).filter(l=>c.includes(l.toLowerCase()));
    if (locs.length) { travelTo(locs[0]); handled=true; }
    else { log('Where? Try "travel to Dark Forest" etc.','sys'); handled=true; }
  }

  // PICK FIGHT / RANDOM FIGHT
  if (!handled && c.includes('pick a fight')) {
    const npc = G.npcs[~~(Math.random()*G.npcs.length)];
    if (npc) { attackNPC(npc); handled=true; }
  }

  // GIVE
  if (!handled && c.includes('give')) {
    const item = p.inventory[0];
    if (!item) { log('Nothing to give.','act'); handled=true; }
    else { giveItemFlow(0); handled=true; }
  }

  // TALK
  if (!handled && (c.includes('talk')||c.includes('speak'))) {
    const t = c.replace(/talk to|talk|speak to|speak with|speak/g,'').trim();
    const npc = findNPC(t);
    if (npc) { talkNPC(npc); handled=true; }
  }

  // Property-based object interaction
  if (!handled) {
    let result = propResolve(c);
    log(result,'act');
    gainXP(4);
    handled=true;
  }

  updateHUD(); saveGame();
}

function propResolve(cmd) {
  const c = cmd.toLowerCase();
  for (const [mat, props] of Object.entries({
    wood:['flammable'],stone:['durable'],water:['cold','slippery'],
    fire:['hot','dangerous'],metal:['hard','conductive'],flesh:['living','fragile'],
  })) {
    if (c.includes(mat)) {
      if (props.includes('flammable') && (c.includes('fire')||c.includes('burn'))) return 'The '+mat+' catches fire.';
      if (props.includes('cold') && c.includes('drink')) return 'Cold and refreshing.';
      if (props.includes('hot')) return 'You get too close. It\'s painfully hot.';
    }
  }
  const generics = [
    'You '+cmd+'. The world takes note.',
    'You attempt to '+cmd+'. Something shifts.',
    cmd.charAt(0).toUpperCase()+cmd.slice(1)+'. An interesting choice.',
    'You '+cmd+'. Life continues around you.',
    'You '+cmd+'. Nearby folk glance your way.',
  ];
  return generics[~~(Math.random()*generics.length)];
}

function findNPC(text) {
  if (!text || text.length < 2) return null;
  const t = text.toLowerCase().trim();
  return G.npcs.find(n=>
    n.name.toLowerCase().includes(t)||
    n.role.toLowerCase().includes(t)||
    n.id.includes(t.replace(' ','_'))
  )||null;
}

// ═══════════════════════════════════════════════════════════════════════
// STATUS HELPERS
// ═══════════════════════════════════════════════════════════════════════
function hasStatus(s) { return G.player.statuses.includes(s); }
function addStatus(s) { if (!G.player.statuses.includes(s)) G.player.statuses.push(s); }
function removeStatus(s) { G.player.statuses = G.player.statuses.filter(x=>x!==s); }

// ═══════════════════════════════════════════════════════════════════════
// XP & LEVELING
// ═══════════════════════════════════════════════════════════════════════
function gainXP(amt) {
  G.player.xp += amt;
  while (G.player.xp >= G.player.xpNext) {
    G.player.xp -= G.player.xpNext;
    G.player.level++;
    G.player.xpNext = ~~(G.player.xpNext * 1.45);
    G.player.hpMax += 12;
    G.player.hp = Math.min(G.player.hpMax, G.player.hp + 25);
    G.player.mpMax += 6;
    G.player.mp = Math.min(G.player.mpMax, G.player.mp + 12);
    const keys = [...STATS];
    const top = keys.sort((a,b)=>G.player.stats[b]-G.player.stats[a])[0];
    G.player.stats[top]++;
    const rnd = STATS[~~(Math.random()*STATS.length)];
    G.player.stats[rnd]++;
    if (G.player.level % 3 === 0) {
      const r2 = STATS[~~(Math.random()*STATS.length)];
      G.player.stats[r2]++;
    }
    log('✦ LEVEL UP! Now '+G.player.level+'. '+STAT_NAMES[top]+' +1, '+STAT_NAMES[rnd]+' +1.','success');
    toast('Level Up! Lv.'+G.player.level);
    updateHUD(); renderDrawer('char');
  }
}

// ═══════════════════════════════════════════════════════════════════════
// NPC AI TICK
// ═══════════════════════════════════════════════════════════════════════
function tickNPCs(hours) {
  G.npcs.forEach(npc => {
    if (!npc.routine) return;
    const action = npc.routine[G.player.hour % npc.routine.length];
    // Move slightly based on routine
    if (action === 'patrols') {
      npc.x += ~~(Math.random()*3)-1;
      npc.y += ~~(Math.random()*3)-1;
    } else if (action === 'works') {
      // Stay near their work spot
      const base = NPC_TEMPLATES[G.world.location]?.find(t=>t.id===npc.id);
      if (base) { npc.x = base.x + ~~(Math.random()*2); npc.y = base.y + ~~(Math.random()*2); }
    }
    npc.x = Math.max(2, Math.min(28, npc.x));
    npc.y = Math.max(2, Math.min(28, npc.y));
  });
}

// ═══════════════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════════════
let loopInterval = null;
function startLoop() {
  if (loopInterval) clearInterval(loopInterval);
  loopInterval = setInterval(gameTick, 1000);
}

function gameTick() {
  if (!G) return;
  G.tick++;
  const p = G.player;

  // Passive regen
  if (G.tick % 8 === 0) {
    if (p.hp < p.hpMax) p.hp = Math.min(p.hpMax, p.hp+1);
    if (p.mp < p.mpMax) p.mp = Math.min(p.mpMax, p.mp+1);
    updateHUD();
  }

  // Time advance
  if (G.tick % 90 === 0) {
    p.hour = (p.hour+1)%24;
    if (p.hour===0) p.day++;
    // NPC movement tick
    tickNPCs(1);
    updateHUD();
  }

  // Status ticks
  if (G.tick % 15 === 0) {
    if (hasStatus('Poisoned')) {
      p.hp = Math.max(1, p.hp-3);
      if (Math.random()<0.15) { removeStatus('Poisoned'); log('The poison passes.','world'); }
    }
    if (hasStatus('On Fire')) {
      p.hp = Math.max(1, p.hp-5);
      if (Math.random()<0.3) removeStatus('On Fire');
    }
    if (hasStatus('Cursed') && Math.random()<0.05) {
      const s = STATS[~~(Math.random()*STATS.length)];
      p.stats[s] = Math.max(1, p.stats[s]-1);
      log('The curse bites. '+STAT_NAMES[s]+' -1.','danger');
    }
  }

  // Ambient events
  if (G.tick % 120 === 0) {
    const loc = LOCATION_DATA[G.world.location];
    if (loc?.ambient) {
      const amb = loc.ambient[~~(Math.random()*loc.ambient.length)];
      log(amb,'world');
    }
  }

  // NPC random actions
  if (G.tick % 45 === 0) {
    const npc = G.npcs[~~(Math.random()*G.npcs.length)];
    if (npc) {
      const base = NPC_TEMPLATES[G.world.location]?.find(t=>t.id===npc.id);
      const action = base?.routine?.[p.hour % (base.routine.length||6)] || 'wanders';
      if (action==='patrols'||action==='wanders') {
        npc.x = Math.max(2, Math.min(28, npc.x + ~~(Math.random()*3)-1));
        npc.y = Math.max(2, Math.min(28, npc.y + ~~(Math.random()*3)-1));
      }
      // Hostile NPCs may approach player
      if (npc.mood==='hostile' && Math.random()<0.3) {
        const dx = Math.sign(p.x - npc.x), dy = Math.sign(p.y - npc.y);
        npc.x += dx; npc.y += dy;
        if (Math.abs(p.x-npc.x)<=1 && Math.abs(p.y-npc.y)<=1) {
          const dmg = 3+~~(Math.random()*(npc.stats.STR/2));
          p.hp = Math.max(0, p.hp-dmg);
          log(npc.name+' attacks you! -'+dmg+' HP.','combat');
          if (p.hp<=0) handleDeath();
          updateHUD();
        }
      }
    }
  }

  // Reputation consequences
  if (G.tick % 200 === 0 && p.crimes > 5) {
    const guard = G.npcs.find(n=>n.role.includes('Guard'));
    if (guard && guard.mood!=='hostile') {
      guard.mood = 'suspicious';
      log('A guard eyes you with suspicion.','world');
    }
  }
  if (G.tick % 300 === 0 && p.reputation==='wanted') {
    const guard = G.npcs.find(n=>n.role.includes('Guard'));
    if (guard) {
      guard.mood = 'hostile';
      log('A guard recognizes you. "That\'s them! Get them!"','danger');
    }
  }

  if (G.tick % 60 === 0) tickFood();
  tickStall();
  if (hasStatus('Jailed') && G.tick % 90 === 0) {
    G.player.jailTime = Math.max(0, G.player.jailTime-1);
    if (G.player.jailTime <= 0) { releaseFromJail(); log('You have served your time. Released.','world'); }
  }
  // Pursuit guards chase player — move every 10 ticks (aggressive)
  if (jailPursuit && G.tick % 10 === 0) {
    const pg = G.npcs.filter(n=>n.temporary);
    pg.forEach(g => {
      const dx=Math.sign(G.player.x-g.x),dy=Math.sign(G.player.y-g.y);
      g.x+=dx;g.y+=dy;
      if (Math.abs(G.player.x-g.x)<=1&&Math.abs(G.player.y-g.y)<=1) {
        const diff = (G.settings?.combatDifficulty==='easy')?0.5:(G.settings?.combatDifficulty==='hard')?1.5:1;
        const dmg = Math.round((6+~~(Math.random()*8))*diff);
        G.player.hp=Math.max(0,G.player.hp-dmg);
        G.player.pursuitsHit=(G.player.pursuitsHit||0)+1;
        log(g.name+' catches you! -'+dmg+' HP. ('+G.player.pursuitsHit+'/4 before capture)','combat');
        if (G.player.hp<=0||G.player.pursuitsHit>=4) {
          G.player.pursuitsHit=0; jailPursuit=false;
          G.player.hp=Math.max(1,~~(G.player.hpMax*0.3));
          log('You collapse. Guards drag you away.','danger');
          setTimeout(()=>sendToJail(G.player.crimes),100);
        }
        updateHUD();
      }
    });
  }
  render();
  if (G.tick % 15 === 0) checkAchievements();
  if (G.tick % 30 === 0) saveGame();
}

// ═══════════════════════════════════════════════════════════════════════
// MOVEMENT
// ═══════════════════════════════════════════════════════════════════════
function handleKey(e) {
  const moves = {
    ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
    w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],
    W:[0,-1],S:[0,1],A:[-1,0],D:[1,0],
  };
  const m = moves[e.key];
  if (!m) return;
  e.preventDefault();
  movePlayer(m[0],m[1]);
}

function movePlayer(dx,dy) {
  if (!G) return;
  const p = G.player;
  const nx = p.x+dx, ny = p.y+dy;
  if (nx<0||ny<0||nx>31||ny>31) return;
  // Check NPC collision
  const npc = G.npcs.find(n=>n.x===nx&&n.y===ny);
  if (npc) { npcMenu(npc.id); return; }
  p.x = nx; p.y = ny;
  // Object interaction hint
  const obj = worldObjects.find(o=>o.x===nx&&o.y===ny);
  if (obj && obj.name) log('You stand at '+obj.name+'.','sys');
  // Clan members follow
  (G.player.clan||[]).forEach((cid,i) => {
    const cn = G.npcs.find(n=>n.id===cid);
    if (cn) { cn.x = Math.max(1,Math.min(30,p.x+(i%2===0?-(i+1):i+1))); cn.y = Math.max(1,Math.min(30,p.y+(i<2?1:-1))); }
  });
  // Pursuit guards step toward player on every player move
  if (jailPursuit) {
    G.npcs.filter(n=>n.temporary).forEach(g => {
      const gdx = Math.sign(p.x-g.x), gdy = Math.sign(p.y-g.y);
      g.x = Math.max(1,Math.min(30,g.x+gdx));
      g.y = Math.max(1,Math.min(30,g.y+gdy));
      if (Math.abs(p.x-g.x)<=1 && Math.abs(p.y-g.y)<=1) {
        const dmg = 5+~~(Math.random()*8);
        p.hp = Math.max(0, p.hp-dmg);
        p.pursuitsHit = (p.pursuitsHit||0)+1;
        log(g.name+' grabs you! -'+dmg+' HP.','combat');
        if (p.hp<=0 || p.pursuitsHit >= 4) {
          p.pursuitsHit=0;
          jailPursuit=false;
          p.hp=Math.max(1,~~(p.hpMax*0.3));
          log('You collapse. Guards drag you away.','danger');
          setTimeout(()=>sendToJail(p.crimes),100);
        }
        updateHUD();
      }
    });
  }
  render();
}

// ── DPAD ──
function initDpad() {
  const dpad = document.getElementById('dpad');
  let rep = null, repI = null;
  function startMove(btn) {
    const dx = parseInt(btn.dataset.dx), dy = parseInt(btn.dataset.dy);
    if (isNaN(dx)) return;
    btn.classList.add('pressed');
    movePlayer(dx,dy);
    rep = setTimeout(()=>{ repI = setInterval(()=>movePlayer(dx,dy),130); },300);
  }
  function stopMove(btn) {
    if (btn) btn.classList.remove('pressed');
    clearTimeout(rep); clearInterval(repI); rep=repI=null;
  }
  dpad.querySelectorAll('button[data-dx]').forEach(btn=>{
    btn.addEventListener('touchstart',e=>{e.preventDefault();startMove(btn);},{passive:false});
    btn.addEventListener('touchend',  e=>{e.preventDefault();stopMove(btn);},{passive:false});
    btn.addEventListener('touchcancel',e=>{e.preventDefault();stopMove(btn);},{passive:false});
    btn.addEventListener('mousedown', ()=>startMove(btn));
    btn.addEventListener('mouseup',   ()=>stopMove(btn));
    btn.addEventListener('mouseleave',()=>stopMove(btn));
  });
}

function openModal(title, body, acts=[]) {
  document.getElementById('m-title').innerHTML = title;
  document.getElementById('m-body').innerHTML = body;
  const aa = document.getElementById('m-acts');
  aa.innerHTML = '';
  acts.forEach(a=>{
    const b = document.createElement('button');
    b.className = 'mbtn '+(a.cls||'');
    b.textContent = a.label;
    b.onclick = a.fn;
    aa.appendChild(b);
  });
  document.getElementById('modal').classList.add('on');
}
function closeModal() { document.getElementById('modal').classList.remove('on'); }
document.getElementById('modal').addEventListener('click', e=>{ if (e.target===document.getElementById('modal')) closeModal(); });

// ── BNAV (mobile bottom nav) ──
let drawerMobileOpen = false;
const BNAV_ID = {char:'self',inv:'inv',create:'forge',world:'world',npcs:'npcs',quests:'quests',settings:'settings'};

function bnav(tab) {
  document.querySelectorAll('.bnbtn').forEach(b=>b.classList.remove('on'));
  const btnId = 'bn-'+(BNAV_ID[tab]||tab);
  document.getElementById(btnId)?.classList.add('on');

  if (tab === 'map') {
    closeMobileDrawer();
    return;
  }
  openMobileDrawer(tab);
}

function openMobileDrawer(tab) {
  drawerTab(tab);
  document.getElementById('drawer').classList.add('open');
  document.body.classList.add('drawer-open');
  drawerMobileOpen = true;
}

function closeMobileDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.body.classList.remove('drawer-open');
  drawerMobileOpen = false;
  document.querySelectorAll('.bnbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('bn-map')?.classList.add('on');
}

function doMcmd() {
  const inp = document.getElementById('mcmd-in');
  if (!inp) return;
  const cmd = inp.value.trim();
  if (!cmd) return;
  inp.value = '';
  resolveCmd(cmd);
}
document.getElementById('mcmd-in')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') doMcmd();
});

// ═══════════════════════════════════════════════════════════════════════
// LOG + EVENT FLASH SYSTEM
// ═══════════════════════════════════════════════════════════════════════
const TYPE_COLOR = {
  act:'var(--text)', sys:'var(--text2)', world:'var(--text2)',
  combat:'var(--ember2)', loot:'var(--gold2)', social:'var(--frost2)',
  creation:'var(--violet2)', success:'var(--sage2)', danger:'var(--ember)',
};
const TYPE_BORDER = {
  act:'var(--border2)', sys:'var(--border)', world:'var(--border)',
  combat:'var(--ember)', loot:'var(--gold)', social:'var(--frost)',
  creation:'var(--violet)', success:'var(--sage)', danger:'var(--ember2)',
};

let flashQ = [], flashBusy = false;

function log(msg, type='act') {
  if (!G) return;
  G.log.push({msg, type, tick: G.tick || 0});
  if (G.log.length > 500) G.log.shift();

  // Desktop feed
  const el = document.getElementById('log-entries');
  if (el) {
    const d = document.createElement('div');
    d.className = 'log-line ' + type;
    d.textContent = msg;
    el.appendChild(d);
    while (el.children.length > 14) el.removeChild(el.firstChild);
  }

  // Mobile: queue flash
  if (window.innerWidth <= 768) {
    flashQ.push({msg, type});
    if (!flashBusy) nextFlash();
  }
}

function nextFlash() {
  if (!flashQ.length) { flashBusy = false; return; }
  flashBusy = true;
  const {msg, type} = flashQ.shift();
  const el = document.getElementById('event-flash');
  if (!el) { flashBusy = false; return; }
  el.textContent = msg;
  el.style.color = TYPE_COLOR[type] || 'var(--text)';
  el.style.borderColor = TYPE_BORDER[type] || 'var(--border2)';
  el.style.opacity = '1';
  el.style.display = 'block';
  clearTimeout(el._t1); clearTimeout(el._t2);
  // Linger time: combat/danger shorter, world/sys longer
  const linger = (type==='sys'||type==='world') ? 2000 : 3000;
  el._t1 = setTimeout(() => {
    el.style.transition = 'opacity 0.6s';
    el.style.opacity = '0';
    el._t2 = setTimeout(() => {
      el.style.display = 'none';
      el.style.transition = '';
      nextFlash();
    }, 620);
  }, linger);
}

// Tap flash to open log history
document.getElementById('event-flash')?.addEventListener('click', openLogModal);
document.getElementById('event-flash')?.addEventListener('touchend', e => { e.preventDefault(); openLogModal(); });

// Log history modal
function openLogModal() {
  const modal = document.getElementById('log-modal');
  const entries = document.getElementById('log-modal-entries');
  if (!modal || !entries || !G) return;
  entries.innerHTML = '';
  G.log.slice().reverse().forEach(e => {
    const d = document.createElement('div');
    d.style.cssText = 'font-size:0.82rem;line-height:1.5;padding:4px 0;border-bottom:1px solid rgba(58,46,30,0.35);';
    d.style.color = TYPE_COLOR[e.type] || 'var(--text)';
    d.style.fontFamily = "'EB Garamond', serif";
    d.textContent = e.msg;
    entries.appendChild(d);
  });
  modal.style.display = 'flex';
  document.body.classList.add('modal-open');
}
function closeLogModal() {
  document.getElementById('log-modal').style.display = 'none';
  document.body.classList.remove('modal-open');
}
document.getElementById('log-modal')?.addEventListener('click', e => {
  if (e.target === document.getElementById('log-modal')) closeLogModal();
});

// ═══════════════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════════════
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.style.display='none', 2800);
}

// UTILS
// ═══════════════════════════════════════════════════════════════════════
function hashStr(s) {
  let h=0; for (let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return Math.abs(h);
}
function mkRng(seed) {
  let s=seed;
  return ()=>{ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; };
}
