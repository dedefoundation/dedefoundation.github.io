// ═══════════════════════════════════════════════════════════════════════
// FORGING / CREATION
// ═══════════════════════════════════════════════════════════════════════
const FORGE_ICONS = {item:'📦',weapon:'⚔️',potion:'⚗️',spell:'✨',skill:'💡',trap:'⚙️',food:'🍲',curse:'☠️',buff:'✦',key:'🗝️'};

function forgeThing() {
  const name = document.getElementById('cr-name')?.value.trim();
  const type = document.getElementById('cr-type')?.value || 'item';
  const desc = document.getElementById('cr-desc')?.value.trim();
  const target = document.getElementById('cr-target')?.value.trim();
  if (!name) { toast('Name your creation first.'); return; }
  const cost = 10 + selProps.length * 4;
  if (G.player.mp < cost) { toast('Not enough MP! Need '+cost+'.'); return; }
  G.player.mp -= cost;
  G.player.crafted++;

  const creation = {
    id: name.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now(),
    name, type,
    icon: FORGE_ICONS[type]||'✦',
    props: [...selProps],
    desc: desc || autoDesc(name,type,selProps),
    qty: 1,
    val: 10 + selProps.length * 12,
    created: true,
    target: target||null,
  };

  // Immediate world effects for world-edit and time-alter
  if (selProps.includes('world-edit') || selProps.includes('time-alter')) {
    applyWorldEdit(creation, desc, target);
  }

  if (type === 'skill') {
    if (!G.player.skills.includes(name)) G.player.skills.push(name);
    log('✦ Skill forged: "'+name+'". It is now part of you. MP -'+cost+'.','creation');
    toast('Skill "'+name+'" learned!');
    renderDrawer('char');
  } else if (type === 'curse') {
    // Apply curse to target NPC if specified
    const tNPC = target ? G.npcs.find(n=>n.name.toLowerCase().includes(target.toLowerCase())) : null;
    if (tNPC) {
      applyItemToNPC(tNPC, creation);
      log('✦ You forge and direct a curse at '+tNPC.name+'. They shudder.','creation');
    } else {
      G.player.inventory.push(creation);
      log('✦ Forged: '+name+' ['+selProps.join(', ')+']. MP -'+cost+'.','creation');
    }
    renderDrawer('npcs');
  } else if (type === 'buff') {
    // Apply buff to self if no target, or to NPC
    if (selProps.includes('stat-boost')) {
      const s = STATS[~~(Math.random()*STATS.length)];
      G.player.stats[s]++;
      log('✦ You imbue yourself with '+name+'. '+STAT_NAMES[s]+' permanently +1! MP -'+cost+'.','creation');
      toast(STAT_NAMES[s]+' +1!');
      renderDrawer('char');
    } else {
      G.player.inventory.push(creation);
      log('✦ Enchantment forged: '+name+'. MP -'+cost+'.','creation');
    }
  } else {
    G.player.inventory.push(creation);
    log('✦ Forged: '+name+' ['+selProps.join(', ')+']. MP -'+cost+'.','creation');
    renderDrawer('inv');
  }

  gainXP(20 + selProps.length * 5);
  selProps = [];
  document.querySelectorAll('.ptag.sel').forEach(t=>t.classList.remove('sel'));
  if (document.getElementById('cr-name')) document.getElementById('cr-name').value='';
  if (document.getElementById('cr-desc')) document.getElementById('cr-desc').value='';
  if (document.getElementById('cr-target')) document.getElementById('cr-target').value='';
  updateCost();
  updateHUD(); saveGame();
}

function applyWorldEdit(creation, desc, target) {
  const d = (desc||'').toLowerCase();
  // Time manipulation
  if (creation.props.includes('time-alter')) {
    if (d.includes('dawn')||d.includes('morning')) { G.player.hour = 7; log('✦ Time warps. It is now dawn.','creation'); }
    else if (d.includes('night')) { G.player.hour = 22; log('✦ Darkness falls suddenly.','creation'); }
    else if (d.includes('skip')||d.includes('advance')) {
      G.player.hour = (G.player.hour+6)%24;
      log('✦ Time lurches forward. Hours pass in an instant.','creation');
    }
  }
  // World changes
  if (creation.props.includes('world-edit')) {
    if (target) {
      const tNPC = G.npcs.find(n=>n.name.toLowerCase().includes(target.toLowerCase()));
      if (tNPC && d.includes('remove')||d.includes('vanish')||d.includes('disappear')) {
        G.npcs = G.npcs.filter(n=>n.id!==tNPC.id);
        log('✦ '+tNPC.name+' ceases to exist in this location.','creation');
      } else if (tNPC && d.includes('stat')) {
        STATS.forEach(s => { if (d.includes(s.toLowerCase())) { tNPC.stats[s] = Math.max(1, tNPC.stats[s] + (d.includes('+') ? 5 : -5)); } });
        log('✦ The fabric of '+tNPC.name+' shifts.','creation');
      } else if (tNPC && (d.includes('friendly')||d.includes('like')||d.includes('love'))) {
        tNPC.mood = 'friendly'; nudgeRelation(tNPC, 40);
        log('✦ '+tNPC.name+' feels an inexplicable warmth toward you.','creation');
      } else if (tNPC && (d.includes('hostile')||d.includes('angry')||d.includes('hate'))) {
        tNPC.mood = 'hostile'; nudgeRelation(tNPC, -40);
        log('✦ A dark cloud settles over '+tNPC.name+'.','creation');
      }
    }
    // Gold manipulation
    if (d.includes('gold')||d.includes('wealth')||d.includes('money')) {
      const gained = 20 + ~~(Math.random()*50) + G.player.stats.INT*3;
      G.player.gold += gained;
      log('✦ Reality bends. ⬡'+gained+' materializes.','loot');
    }
  }
}

function autoDesc(name, type, props) {
  const d = {
    weapon:`A ${props.includes('fire')?'blazing':props.includes('shadow')?'dark':'crude'} ${name}. Hums with ${props[0]||'unknown'} energy.`,
    potion:`A ${props.includes('healing')?'glowing':props.includes('poison')?'murky':'swirling'} concoction.`,
    spell:`The formula for ${name}. Requires concentration to cast.`,
    food:`${name}. Combines: ${props.slice(0,3).join(', ')}.`,
    curse:`${name}. A dark working. Handle with intent.`,
    buff:`${name}. An empowerment of ${props.join(', ')}.`,
    skill:`The art of ${name}. Now permanently yours.`,
    item:`${name}. Properties: ${props.join(', ')}.`,
    trap:`${name}. Triggers on contact.`,
    key:`${name}. Opens something.`,
  };
  return d[type]||`${name}.`;
}

// ═══════════════════════════════════════════════════════════════════════
// FREE COMMAND RESOLUTION
// ═══════════════════════════════════════════════════════════════════════
function doCmd() {
  const inp = document.getElementById('cmd-in');
  const cmd = inp.value.trim();
  if (!cmd) return;
  inp.value = '';
  resolveCmd(cmd);
}
function doCmd2(cmd) { resolveCmd(cmd); }

function resolveCmd(raw) {
  const c = raw.toLowerCase().trim();
  const p = G.player;
  let handled = false;

  // HELP
  if (c==='help'||c==='?'||c==='commands') {
    openModal('✦ ANIMUS Commands',`
      <div style="font-size:0.82rem;line-height:1.9;color:var(--text);">
        <div style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:0.65rem;text-transform:uppercase;margin-bottom:0.3rem;">Movement</div>
        WASD / Arrow keys (desktop) · D-pad (mobile)<br>
        Walk into an NPC to open their menu<br><br>
        <div style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:0.65rem;text-transform:uppercase;margin-bottom:0.3rem;">Survival</div>
        <span style="color:var(--gold2);">rest / sleep</span> — Recover HP+MP, advance time<br>
        <span style="color:var(--gold2);">forage</span> — Search for herbs, food, materials<br>
        <span style="color:var(--gold2);">cook / brew</span> — Combine 2+ edibles into a dish<br>
        <span style="color:var(--gold2);">look / observe</span> — Describe surroundings<br><br>
        <div style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:0.65rem;text-transform:uppercase;margin-bottom:0.3rem;">Combat & Crime</div>
        <span style="color:var(--ember2);">attack [name]</span> — Fight someone<br>
        <span style="color:var(--ember2);">steal from [name]</span> — Pickpocket<br>
        <span style="color:var(--ember2);">intimidate [name]</span> — Force compliance<br>
        <span style="color:var(--frost2);">kiss [name]</span> — Romantic/magical interaction<br><br>
        <div style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:0.65rem;text-transform:uppercase;margin-bottom:0.3rem;">Economy</div>
        <span style="color:var(--gold2);">open stall / sell</span> — Sell goods for gold<br>
        <span style="color:var(--gold2);">browse market / trade</span> — Buy from merchants<br><br>
        <div style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:0.65rem;text-transform:uppercase;margin-bottom:0.3rem;">Travel</div>
        <span style="color:var(--sage2);">travel to [place]</span> — Move to another location<br>
        Places: Crossroads Town, Dark Forest, The Ruins,<br>
        Hilltop Village, Docks, Bandit Camp<br><br>
        <div style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:0.65rem;text-transform:uppercase;margin-bottom:0.3rem;">Creation (Forge tab)</div>
        Name + type + properties + description → Forge<br>
        Properties like <em>world-edit</em> or <em>time-alter</em> affect reality<br>
        <em>stat-boost</em> on a buff = permanent stat gain<br><br>
        <div style="color:var(--text3);font-style:italic;font-size:0.78rem;">Type anything. The world tries to resolve it.</div>
      </div>`,
      [{label:'Close',fn:closeModal}]);
    return;
  }

  // KISS
  if (c.includes('kiss')) {
    const t = c.replace(/kiss\s*/i,'').trim();
    const npc = findNPC(t);
    if (npc) { kissNPC(npc); handled=true; }
    else if (c.includes('tree')||c.includes('wood')) { log('You kiss a tree. It tastes of bark. It is unmoved.','act'); handled=true; }
    else if (c.includes('rock')||c.includes('stone')) { log('The rock grows slightly warmer from your lips. Still a rock.','act'); handled=true; }
    else if (c.includes('fire')||c.includes('flame')) { p.hp=Math.max(1,p.hp-12); log('You kiss the fire. Deeply unwise. -12 HP.','combat'); handled=true; }
    else if (c.includes('water')||c.includes('sea')) { log('Cold. Wet. Nothing else.','act'); handled=true; }
  }

  // ATTACK
  if (!handled && (c.includes('attack')||c.includes('fight')||c.includes('punch')||c.includes('hit ')||c.includes('stab'))) {
    const t = c.replace(/attack|fight|punch|hit|stab/g,'').trim();
    const npc = findNPC(t) || G.npcs[~~(Math.random()*G.npcs.length)];
    if (npc) { attackNPC(npc); handled=true; }
  }

  // STEAL
  if (!handled && (c.includes('steal')||c.includes('pickpocket')||c.includes('rob'))) {
    const t = c.replace(/steal|from|pickpocket|rob/g,'').trim();
    const npc = findNPC(t) || G.npcs[~~(Math.random()*G.npcs.length)];
    if (npc) { stealFromNPC(npc); handled=true; }
  }

  // INTIMIDATE
  if (!handled && c.includes('intimidate')) {
    const t = c.replace('intimidate','').trim();
    const npc = findNPC(t);
    if (npc) { intimidateNPC(npc); handled=true; }
  }

  // REST/SLEEP
  if (!handled && (c.includes('rest')||c.includes('sleep')||c==='recover')) {
    const hpg = ~~(p.hpMax*0.35), mpg = ~~(p.mpMax*0.45);
    p.hp = Math.min(p.hpMax, p.hp+hpg);
    p.mp = Math.min(p.mpMax, p.mp+mpg);
    p.hour = (p.hour+7)%24;
    if (p.hour<7) p.day++;
    // Tick world while sleeping
    tickNPCs(7);
    log('You rest. +'+hpg+' HP, +'+mpg+' MP. Time passes.','success');
    handled=true;
    gainXP(4);
  }

  // FORAGE
  if (!handled && (c.includes('forage')||c.includes('gather')||c.includes('scavenge'))) {
    const loc = LOCATION_DATA[G.world.location];
    const bonus = (loc&&loc.type==='wilderness') ? 0.3 : 0;
    if (Math.random() < 0.55 + bonus + p.stats.WIS*0.02) {
      const pool = loc&&loc.type==='ruins'
        ? [{n:'Cracked Gem',i:'💎',pr:['valuable'],v:15},{n:'Ancient Shard',i:'🪬',pr:['magic','ancient'],v:20}]
        : [{n:'Wild Herb',i:'🌿',pr:['edible','healing'],v:4},{n:'Mushroom',i:'🍄',pr:['edible','poison'],v:3},
           {n:'Berries',i:'🫐',pr:['edible'],v:2},{n:'Strange Root',i:'🌱',pr:['edible','magic'],v:7}];
      const found = pool[~~(Math.random()*pool.length)];
      p.inventory.push({id:'foraged_'+Date.now(),name:found.n,icon:found.i,qty:1,props:found.pr,val:found.v,desc:'Foraged.'});
      log('You search and find: '+found.n+'.','loot');
      gainXP(8); updateHUD(); renderDrawer('inv');
    } else {
      log('You search but find nothing useful here.','act');
      gainXP(2);
    }
    handled=true;
  }

  // COOK / BREW
  if (!handled && (c.includes('cook')||c.includes('brew')||c.includes('bake')||c.includes('prepare food'))) {
    const edibles = p.inventory.filter(i=>i.props.includes('edible'));
    if (edibles.length >= 2) {
      const combined = [...new Set([...edibles[0].props,...edibles[1].props])];
      const dish = 'Mystery '+ ['Stew','Brew','Cake','Tonic','Concoction'][~~(Math.random()*5)];
      edibles[0].qty--; if (edibles[0].qty<=0) p.inventory.splice(p.inventory.indexOf(edibles[0]),1);
      edibles[1].qty--; if (edibles[1].qty<=0) p.inventory.splice(p.inventory.indexOf(edibles[1]),1);
      p.inventory.push({id:'cooked_'+Date.now(),name:dish,icon:'🍲',qty:1,props:combined,val:14,desc:'Cooked by hand.'});
      log('You cook a '+dish+'. Properties: ['+combined.join(', ')+'].','creation');
      gainXP(12); updateHUD(); renderDrawer('inv');
    } else {
      log('You need at least 2 edible ingredients to cook.','act');
    }
    handled=true;
  }

  // LOOK / OBSERVE
  if (!handled && (c.includes('look')||c.includes('observe')||c.includes('examine')||c.includes('survey'))) {
    const loc = LOCATION_DATA[G.world.location];
    const nearby = G.npcs.slice(0,3).map(n=>n.name+' ('+n.role+')').join(', ') || 'nobody';
    const ambient = loc?.ambient[~~(Math.random()*loc.ambient.length)] || 'The area is quiet.';
    log('You survey '+G.world.location+'. Nearby: '+nearby+'. '+ambient,'act');
    gainXP(3); handled=true;
  }

  // SELL / OPEN STALL
  if (!handled && (c.includes('sell')||c.includes('stall')||c.includes('open shop')||c.includes('market'))) {
    const item = p.inventory.find(i=>i.val>0);
    if (item) {
      const demand = LOCATION_DATA[G.world.location]?.wealth || 2;
      const mult = 0.6 + demand*0.15 + Math.random()*0.3 + p.stats.CHA*0.02;
      const earned = Math.max(1, ~~(item.val * mult));
      p.gold += earned;
      item.qty--; if (item.qty<=0) p.inventory.splice(p.inventory.indexOf(item),1);
      log('You sell '+item.name+' for ⬡'+earned+'. '+( earned > item.val ? 'Good price!' : 'Modest sale.'),'loot');
      gainXP(10); updateHUD(); renderDrawer('inv');
    } else { log('Nothing to sell.','act'); }
    handled=true;
  }

  // TRADE / BROWSE
  if (!handled && (c.includes('trade')||c.includes('browse')||c.includes('shop'))) {
    const merchant = G.npcs.find(n=>['Merchant','Smuggler','Innkeeper'].includes(n.role));
    if (merchant) { tradeNPC(merchant); handled=true; }
    else { log('No merchant nearby.','act'); handled=true; }
  }

  // TRAVEL
  if (!handled && (c.includes('travel')||c.includes('go to')||c.includes('head to')||c.includes('walk to'))) {
    const locs = Object.keys(LOCATION_DATA).filter(l=>c.includes(l.toLowerCase()));
    if (locs.length) { travelTo(locs[0]); handled=true; }
    else { log('Where? Try "travel to Dark Forest" etc.','sys'); handled=true; }
  }

  // PICK FIGHT / RANDOM FIGHT
  if (!handled && c.includes('pick a fight')) {
    const npc = G.npcs[~~(Math.random()*G.npcs.length)];
    if (npc) { attackNPC(npc); handled=true; }
  }

  // GIVE
  if (!handled && c.includes('give')) {
    const item = p.inventory[0];
    if (!item) { log('Nothing to give.','act'); handled=true; }
    else { giveItemFlow(0); handled=true; }
  }

  // TALK
  if (!handled && (c.includes('talk')||c.includes('speak'))) {
    const t = c.replace(/talk to|talk|speak to|speak with|speak/g,'').trim();
    const npc = findNPC(t);
    if (npc) { talkNPC(npc); handled=true; }
  }

  // Property-based object interaction
  if (!handled) {
    let result = propResolve(c);
    log(result,'act');
    gainXP(4);
    handled=true;
  }

  updateHUD(); saveGame();
}

function propResolve(cmd) {
  const c = cmd.toLowerCase();
  for (const [mat, props] of Object.entries({
    wood:['flammable'],stone:['durable'],water:['cold','slippery'],
    fire:['hot','dangerous'],metal:['hard','conductive'],flesh:['living','fragile'],
  })) {
    if (c.includes(mat)) {
      if (props.includes('flammable') && (c.includes('fire')||c.includes('burn'))) return 'The '+mat+' catches fire.';
      if (props.includes('cold') && c.includes('drink')) return 'Cold and refreshing.';
      if (props.includes('hot')) return 'You get too close. It\'s painfully hot.';
    }
  }
  const generics = [
    'You '+cmd+'. The world takes note.',
    'You attempt to '+cmd+'. Something shifts.',
    cmd.charAt(0).toUpperCase()+cmd.slice(1)+'. An interesting choice.',
    'You '+cmd+'. Life continues around you.',
    'You '+cmd+'. Nearby folk glance your way.',
  ];
  return generics[~~(Math.random()*generics.length)];
}

function findNPC(text) {
  if (!text || text.length < 2) return null;
  const t = text.toLowerCase().trim();
  return G.npcs.find(n=>
    n.name.toLowerCase().includes(t)||
    n.role.toLowerCase().includes(t)||
    n.id.includes(t.replace(' ','_'))
  )||null;
}

// STATUS HELPERS
// ═══════════════════════════════════════════════════════════════════════
function hasStatus(s) { return G.player.statuses.includes(s); }
function addStatus(s) { if (!G.player.statuses.includes(s)) G.player.statuses.push(s); }
function removeStatus(s) { G.player.statuses = G.player.statuses.filter(x=>x!==s); }

// ═══════════════════════════════════════════════════════════════════════
// XP & LEVELING
// ═══════════════════════════════════════════════════════════════════════
function gainXP(amt) {
  G.player.xp += amt;
  while (G.player.xp >= G.player.xpNext) {
    G.player.xp -= G.player.xpNext;
    G.player.level++;
    G.player.xpNext = ~~(G.player.xpNext * 1.45);
    G.player.hpMax += 12;
    G.player.hp = Math.min(G.player.hpMax, G.player.hp + 25);
    G.player.mpMax += 6;
    G.player.mp = Math.min(G.player.mpMax, G.player.mp + 12);
    const keys = [...STATS];
    const top = keys.sort((a,b)=>G.player.stats[b]-G.player.stats[a])[0];
    G.player.stats[top]++;
    const rnd = STATS[~~(Math.random()*STATS.length)];
    G.player.stats[rnd]++;
    if (G.player.level % 3 === 0) {
      const r2 = STATS[~~(Math.random()*STATS.length)];
      G.player.stats[r2]++;
    }
    log('✦ LEVEL UP! Now '+G.player.level+'. '+STAT_NAMES[top]+' +1, '+STAT_NAMES[rnd]+' +1.','success');
    toast('Level Up! Lv.'+G.player.level);
    updateHUD(); renderDrawer('char');
  }
}

// ═══════════════════════════════════════════════════════════════════════
// NPC AI TICK
// ═══════════════════════════════════════════════════════════════════════
function tickNPCs(hours) {
  G.npcs.forEach(npc => {
    if (!npc.routine) return;
    const action = npc.routine[G.player.hour % npc.routine.length];
    // Move slightly based on routine
    if (action === 'patrols') {
      npc.x += ~~(Math.random()*3)-1;
      npc.y += ~~(Math.random()*3)-1;
    } else if (action === 'works') {
      // Stay near their work spot
      const base = NPC_TEMPLATES[G.world.location]?.find(t=>t.id===npc.id);
      if (base) { npc.x = base.x + ~~(Math.random()*2); npc.y = base.y + ~~(Math.random()*2); }
    }
    npc.x = Math.max(2, Math.min(28, npc.x));
    npc.y = Math.max(2, Math.min(28, npc.y));
  });
}

// ═══════════════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════════════
let loopInterval = null;
function startLoop() {
  if (loopInterval) clearInterval(loopInterval);
  loopInterval = setInterval(gameTick, 1000);
}

function gameTick() {
  if (!G) return;
  G.tick++;
  const p = G.player;

  // Passive regen
  if (G.tick % 8 === 0) {
    if (p.hp < p.hpMax) p.hp = Math.min(p.hpMax, p.hp+1);
    if (p.mp < p.mpMax) p.mp = Math.min(p.mpMax, p.mp+1);
    updateHUD();
  }

  // Time advance
  if (G.tick % 90 === 0) {
    p.hour = (p.hour+1)%24;
    if (p.hour===0) p.day++;
    // NPC movement tick
    tickNPCs(1);
    updateHUD();
  }

  // Status ticks
  if (G.tick % 15 === 0) {
    if (hasStatus('Poisoned')) {
      p.hp = Math.max(1, p.hp-3);
      if (Math.random()<0.15) { removeStatus('Poisoned'); log('The poison passes.','world'); }
    }
    if (hasStatus('On Fire')) {
      p.hp = Math.max(1, p.hp-5);
      if (Math.random()<0.3) removeStatus('On Fire');
    }
    if (hasStatus('Cursed') && Math.random()<0.05) {
      const s = STATS[~~(Math.random()*STATS.length)];
      p.stats[s] = Math.max(1, p.stats[s]-1);
      log('The curse bites. '+STAT_NAMES[s]+' -1.','danger');
    }
  }

  // Ambient events
  if (G.tick % 120 === 0) {
    const loc = LOCATION_DATA[G.world.location];
    if (loc?.ambient) {
      const amb = loc.ambient[~~(Math.random()*loc.ambient.length)];
      log(amb,'world');
    }
  }

  // NPC random actions
  if (G.tick % 45 === 0) {
    const npc = G.npcs[~~(Math.random()*G.npcs.length)];
    if (npc) {
      const base = NPC_TEMPLATES[G.world.location]?.find(t=>t.id===npc.id);
      const action = base?.routine?.[p.hour % (base.routine.length||6)] || 'wanders';
      if (action==='patrols'||action==='wanders') {
        npc.x = Math.max(2, Math.min(28, npc.x + ~~(Math.random()*3)-1));
        npc.y = Math.max(2, Math.min(28, npc.y + ~~(Math.random()*3)-1));
      }
      // Hostile NPCs may approach player
      if (npc.mood==='hostile' && Math.random()<0.3) {
        const dx = Math.sign(p.x - npc.x), dy = Math.sign(p.y - npc.y);
        npc.x += dx; npc.y += dy;
        if (Math.abs(p.x-npc.x)<=1 && Math.abs(p.y-npc.y)<=1) {
          const dmg = 3+~~(Math.random()*(npc.stats.STR/2));
          p.hp = Math.max(0, p.hp-dmg);
          log(npc.name+' attacks you! -'+dmg+' HP.','combat');
          if (p.hp<=0) handleDeath();
          updateHUD();
        }
      }
    }
  }

  // Reputation consequences
  if (G.tick % 200 === 0 && p.crimes > 5) {
    const guard = G.npcs.find(n=>n.role.includes('Guard'));
    if (guard && guard.mood!=='hostile') {
      guard.mood = 'suspicious';
      log('A guard eyes you with suspicion.','world');
    }
  }
  if (G.tick % 300 === 0 && p.reputation==='wanted') {
    const guard = G.npcs.find(n=>n.role.includes('Guard'));
    if (guard) {
      guard.mood = 'hostile';
      log('A guard recognizes you. "That\'s them! Get them!"','danger');
    }
  }

  render();
  if (G.tick % 30 === 0) saveGame();
}

// ═══════════════════════════════════════════════════════════════════════
// MOVEMENT
// ═══════════════════════════════════════════════════════════════════════
function handleKey(e) {
  const moves = {
    ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
    w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],
    W:[0,-1],S:[0,1],A:[-1,0],D:[1,0],
  };
  const m = moves[e.key];
  if (!m) return;
  e.preventDefault();
  movePlayer(m[0],m[1]);
}

function movePlayer(dx,dy) {
  if (!G) return;
  const p = G.player;
  const nx = p.x+dx, ny = p.y+dy;
  if (nx<0||ny<0||nx>31||ny>31) return;
  // Check NPC collision
  const npc = G.npcs.find(n=>n.x===nx&&n.y===ny);
  if (npc) { npcMenu(npc.id); return; }
  p.x = nx; p.y = ny;
  // Object interaction hint
  const obj = worldObjects.find(o=>o.x===nx&&o.y===ny);
  if (obj && obj.name) log('You stand at '+obj.name+'.','sys');
  render();
}

// ── DPAD ──
function initDpad() {
  const dpad = document.getElementById('dpad');
  let rep = null, repI = null;
  function startMove(btn) {
    const dx = parseInt(btn.dataset.dx), dy = parseInt(btn.dataset.dy);
    if (isNaN(dx)) return;
    btn.classList.add('pressed');
    movePlayer(dx,dy);
    rep = setTimeout(()=>{ repI = setInterval(()=>movePlayer(dx,dy),130); },300);
  }
  function stopMove(btn) {
    if (btn) btn.classList.remove('pressed');
    clearTimeout(rep); clearInterval(repI); rep=repI=null;
  }
  dpad.querySelectorAll('button[data-dx]').forEach(btn=>{
    btn.addEventListener('touchstart',e=>{e.preventDefault();startMove(btn);},{passive:false});
    btn.addEventListener('touchend',  e=>{e.preventDefault();stopMove(btn);},{passive:false});
    btn.addEventListener('touchcancel',e=>{e.preventDefault();stopMove(btn);},{passive:false});
    btn.addEventListener('mousedown', ()=>startMove(btn));
    btn.addEventListener('mouseup',   ()=>stopMove(btn));
    btn.addEventListener('mouseleave',()=>stopMove(btn));
  });
}

// ═══════════════════════════════════════════════════════════════════════
// LOG + EVENT FLASH SYSTEM
// ═══════════════════════════════════════════════════════════════════════
const TYPE_COLOR = {
  act:'var(--text)', sys:'var(--text2)', world:'var(--text2)',
  combat:'var(--ember2)', loot:'var(--gold2)', social:'var(--frost2)',
  creation:'var(--violet2)', success:'var(--sage2)', danger:'var(--ember)',
};
const TYPE_BORDER = {
  act:'var(--border2)', sys:'var(--border)', world:'var(--border)',
  combat:'var(--ember)', loot:'var(--gold)', social:'var(--frost)',
  creation:'var(--violet)', success:'var(--sage)', danger:'var(--ember2)',
};

let flashQ = [], flashBusy = false;

function log(msg, type='act') {
  if (!G) return;
  G.log.push({msg, type, tick: G.tick || 0});
  if (G.log.length > 500) G.log.shift();

  // Desktop feed
  const el = document.getElementById('log-entries');
  if (el) {
    const d = document.createElement('div');
    d.className = 'log-line ' + type;
    d.textContent = msg;
    el.appendChild(d);
    while (el.children.length > 14) el.removeChild(el.firstChild);
  }

  // Mobile: queue flash
  if (window.innerWidth <= 768) {
    flashQ.push({msg, type});
    if (!flashBusy) nextFlash();
  }
}

function nextFlash() {
  if (!flashQ.length) { flashBusy = false; return; }
  flashBusy = true;
  const {msg, type} = flashQ.shift();
  const el = document.getElementById('event-flash');
  if (!el) { flashBusy = false; return; }
  el.textContent = msg;
  el.style.color = TYPE_COLOR[type] || 'var(--text)';
  el.style.borderColor = TYPE_BORDER[type] || 'var(--border2)';
  el.style.opacity = '1';
  el.style.display = 'block';
  clearTimeout(el._t1); clearTimeout(el._t2);
  // Linger time: combat/danger shorter, world/sys longer
  const linger = (type==='sys'||type==='world') ? 2000 : 3000;
  el._t1 = setTimeout(() => {
    el.style.transition = 'opacity 0.6s';
    el.style.opacity = '0';
    el._t2 = setTimeout(() => {
      el.style.display = 'none';
      el.style.transition = '';
      nextFlash();
    }, 620);
  }, linger);
}

// Tap flash to open log history
document.getElementById('event-flash')?.addEventListener('click', openLogModal);
document.getElementById('event-flash')?.addEventListener('touchend', e => { e.preventDefault(); openLogModal(); });

// Log history modal
function openLogModal() {
  const modal = document.getElementById('log-modal');
  const entries = document.getElementById('log-modal-entries');
  if (!modal || !entries || !G) return;
  entries.innerHTML = '';
  G.log.slice().reverse().forEach(e => {
    const d = document.createElement('div');
    d.style.cssText = 'font-size:0.82rem;line-height:1.5;padding:4px 0;border-bottom:1px solid rgba(58,46,30,0.35);';
    d.style.color = TYPE_COLOR[e.type] || 'var(--text)';
    d.style.fontFamily = "'EB Garamond', serif";
    d.textContent = e.msg;
    entries.appendChild(d);
  });
  modal.style.display = 'flex';
  document.body.classList.add('modal-open');
}
function closeLogModal() {
  document.getElementById('log-modal').style.display = 'none';
  document.body.classList.remove('modal-open');
}
document.getElementById('log-modal')?.addEventListener('click', e => {
  if (e.target === document.getElementById('log-modal')) closeLogModal();
});

// UTILS

function hashStr(s) {
  let h=0; for (let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return Math.abs(h);
}
function mkRng(seed) {
  let s=seed;
  return ()=>{ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; };
}
